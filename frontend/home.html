<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>TrendCast</title>

<link rel="stylesheet" href="home.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<header>
<h2>TrendCast</h2>
</header>

<h1>Dashboard</h1>

<!-- SUMMARY CARDS -->

<div class="cards">

<div class="card">
<h3>Total Uploads</h3>
<p id="totalUploads">0</p>
</div>

<div class="card">
<h3>Products</h3>
<p id="totalProducts">0</p>
</div>

<div class="card">
<h3>Forecast Runs</h3>
<p id="forecastRuns">0</p>
</div>

</div>

<!-- UPLOAD DATASET -->

<div class="upload-box">

<h2>Upload Dataset</h2>

<div id="uploadContainer">

<div id="uploadArea" class="upload-area">

<div class="upload-icon">☁</div>

<p>Drag and drop or click to upload</p>

<button type="button" class="browse-btn">Browse CSV / Excel</button>

</div>

<input type="file" id="datasetFile" hidden accept=".csv,.xlsx">

</div>

<button type="button" id="uploadBtn" class="action-btn">
Preview Dataset
</button>

</div>

<!-- RAW PREVIEW -->

<div id="rawPreviewContainer" class="upload-box" style="display:none">

<h2>Raw Dataset Preview</h2>

<div id="rawTable"></div>

<button type="button" id="cleanDataBtn" class="action-btn">
Clean Data
</button>

</div>

</div>

<script src="home.js"></script>

</body>
</html>
