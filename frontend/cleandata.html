<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>TrendCast - Clean Data</title>

<link rel="stylesheet" href="cleandata.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<header>

<h2>TrendCast</h2>

<button type="button" id="backBtn" class="nav-btn">
← Back to Dashboard
</button>

</header>


<h1>Cleaned Dataset</h1>

<p class="subtitle">
Preview of cleaned dataset (first 15 rows)
</p>



<!-- CLEAN TABLE -->

<div id="cleanTableContainer" class="data-box">

<p>Loading cleaned data...</p>

</div>



<!-- METADATA -->

<div id="metadataCards" class="cards">

<div class="card">
<h3>Total Rows</h3>
<p id="metaRows">0</p>
</div>

<div class="card">
<h3>Products</h3>
<p id="metaProducts">0</p>
</div>

<div class="card">
<h3>Date Start</h3>
<p id="metaStart">-</p>
</div>

<div class="card">
<h3>Date End</h3>
<p id="metaEnd">-</p>
</div>

</div>



<!-- ACTION BUTTONS -->

<div class="actions">

<button type="button" id="downloadCleanBtn" class="action-btn">
Download Cleaned Dataset
</button>

<button type="button" id="forecastBtn" class="action-btn forecast-btn">
Generate Forecast
</button>

</div>

</div>

<script src="cleandata.js"></script>

</body>

</html>
